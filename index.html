<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEDALO TV</title>
    
    <script type="text/javascript" src="//acp.adcash.com/script/aclib.js"></script>
    <script type="text/javascript">
        aclib.runAutoTag({
            zoneId: 'hiimtav9sf',
        });
    </script>

    <script type="text/javascript" src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #444; --light-gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        header { text-align: center; margin-bottom: 25px; width: 100%; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.3)); }
        .brand { font-size: 9px; letter-spacing: 5px; color: var(--light-gray); text-transform: uppercase; margin-top: 5px; }

        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #111; position: relative; aspect-ratio: 16/9; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Contenitore Adcash VAST sopra il video */
        #adContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }

        .info-bar { padding: 15px; background: var(--panel); border-bottom: 1px solid #111; width: 100%; border-radius: 0 0 20px 20px; margin-top: -20px; position: relative; z-index: 5; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; color: #fff; text-align: center; }

        .unmute-box { width: 100%; margin: 20px 0; display: flex; justify-content: center; }
        #extUnmuteBtn { background: var(--neon); color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,85,0.6); width: 100%; max-width: 300px; transition: 0.3s; }

        .icon-bar { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #111; margin-bottom: 10px; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; min-width: 60px; }
        .icon-btn span { font-size: 20px; }
        .icon-btn label { font-size: 8px; color: var(--light-gray); text-transform: uppercase; }
        
        #likeBtn.liked span { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .form-box { width: 100%; margin-top: 25px; padding: 25px; background: var(--panel); border-radius: 15px; border: 1px solid #111; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; border-radius: 10px; }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        
        footer { padding: 40px 0; text-align: center; opacity: 0.15; font-size: 10px; width: 100%; }
    </style>
</head>
<body onload="requestPreroll()">

    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" class="logo-img">
            <div class="brand">Music Distribution</div>
        </header>

        <div class="video-container">
            <video id="mainPlayer" playsinline muted loop>
                <source src="https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/Red%20Think%20-%20Badret%20-%20Official%20video.mp4" type="video/mp4">
            </video>
            <div id="adContainer"></div>
        </div>
        
        <div class="info-bar">
            <div id="videoTitle" class="video-title">BADRET - Red Think</div>
        </div>

        <div class="unmute-box">
            <button id="extUnmuteBtn" onclick="unmuteEverything()">🔇 TAP TO UNMUTE</button>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" id="likeBtn" onclick="handleLike()">
                <span>♡</span>
                <label id="likeCounter">2384</label>
            </button>
            <button class="icon-btn" onclick="prevTrack()"><span>⏮</span><label>Back</label></button>
            <button class="icon-btn" onclick="togglePlay()"><span>■/▶</span><label>Stop/Play</label></button>
            <button class="icon-btn" onclick="nextTrack()"><span>⏭</span><label>Forward</label></button>
        </div>

        <div class="form-box">
            <input type="text" placeholder="Nickname">
            <input type="email" placeholder="Email Address">
            <button class="sub-btn">Unlock HQ Pack</button>
        </div>
        <footer>DEDALO &copy; 2026</footer>
    </div>

    <script>
        const VAST_TAG = "https://adcash.com/video/select.php?r=11187574";
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/";
        const playlist = [
            "Red%20Think%20-%20Badret%20-%20Official%20video.mp4",
            "Future%20Voyage%20-%20Badret.mp4"
        ];
        
        let currentIdx = 0;
        const player = document.getElementById('mainPlayer');
        let adsLoader, adsManager, adDisplayContainer;

        // --- CARICAMENTO IMMEDIATO (YT STYLE) ---
        function requestPreroll() {
            adDisplayContainer = new google.ima.AdDisplayContainer(document.getElementById('adContainer'), player);
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, (e) => {
                adsManager = e.getAdsManager(player);
                adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
                adsManager.start(); // Parte muto per bypassare i blocchi browser
            }, false);

            const adsRequest = new google.ima.AdsRequest();
            adsRequest.adTagUrl = VAST_TAG;
            adsLoader.requestAds(adsRequest);
            player.play(); // Avvia il video principale in background (muto)
        }

        function unmuteEverything() {
            player.muted = false;
            if (adsManager) adsManager.setVolume(1);
            document.getElementById('extUnmuteBtn').style.display = 'none';
            document.getElementById('adContainer').style.pointerEvents = 'auto';
            adDisplayContainer.initialize(); // Sblocca l'interazione audio per il browser
        }

        function handleLike() {
            let counter = document.getElementById('likeCounter');
            let btn = document.getElementById('likeBtn');
            if (btn.classList.contains('liked')) {
                counter.innerText = parseInt(counter.innerText) - 1;
                btn.querySelector('span').innerText = '♡';
            } else {
                counter.innerText = parseInt(counter.innerText) + 1;
                btn.querySelector('span').innerText = '♥';
            }
            btn.classList.toggle('liked');
        }

        function togglePlay() { player.paused ? player.play() : player.pause(); }
        
        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            player.src = R2_URL + playlist[currentIdx];
            player.play();
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            player.src = R2_URL + playlist[currentIdx];
            player.play();
        }
    </script>
</body>
</html>
