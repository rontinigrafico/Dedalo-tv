<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="DEDALO TV | BADRET">
    <meta property="og:type" content="video.other">
    <meta property="og:video" content="https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/Red%20Think%20-%20Badret%20-%20Official%20video.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:image" content="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png">

    <title>DEDALO TV</title>
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #444; --light-gray: #888; }
        
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        header { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.3)); }
        .brand { font-size: 9px; letter-spacing: 5px; color: var(--light-gray); text-transform: uppercase; margin-top: 5px; }

        /* Video Player Area */
        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #111; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        #audioOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 20; cursor: pointer; }
        .audio-icon { font-size: 35px; color: var(--neon); animation: pulse 1.5s infinite; }

        .info-bar { padding: 15px; background: var(--panel); border-bottom: 1px solid #111; }
        .now-playing { font-size: 9px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; letter-spacing: -0.2px; }

        /* Icon Menu Minimal - Spostato SOTTO i commenti */
        .icon-bar { display: flex; justify-content: space-around; padding: 20px 0; order: 3; border-top: 1px solid #111; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .icon-btn span { font-size: 18px; }
        .icon-btn label { font-size: 8px; color: var(--light-gray); text-transform: uppercase; letter-spacing: 1px; }

        /* Cusdis Integration - Spostato SOPRA (order 2) */
        #comment-wrapper { order: 2; margin: 20px 0; }
        #cusdis_thread { 
            background: transparent !important; 
            min-height: 150px;
        }

        /* Hack per forzare colori Cusdis (Rosa per i nomi) */
        #cusdis_thread iframe { 
            color-scheme: dark; 
            filter: contrast(1.1) brightness(1.1); 
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.6; } 100% { transform: scale(1); opacity: 1; } }
        
        footer { order: 4; padding: 40px 0; text-align: center; opacity: 0.2; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
            <div class="brand">Music Distribution</div>
        </header>

        <div class="video-container">
            <div id="audioOverlay" onclick="enableAudio()">
                <div class="audio-icon">🔊</div>
            </div>
            <video id="dedaloPlayer" autoplay muted playsinline>
                <source src="" type="video/mp4">
            </video>
            <div class="info-bar">
                <div class="now-playing">Direct Broadcast</div>
                <div id="videoTitle" class="video-title">Tuning in...</div>
            </div>
        </div>

        <div id="comment-wrapper">
            <div id="cusdis_thread"
              data-host="https://cusdis.com"
              data-app-id="6437d965-223f-445e-9d54-bc1ccc389ad9"
              data-page-id="dedalo_tv_main"
              data-page-url="https://rontinigrafico.github.io/Dedalo-tv/"
              data-page-title="Dedalo TV"
              data-theme="dark">
            </div>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" onclick="toggleLike()">
                <span id="likeIcon">♡</span>
                <label id="likeCount">2.4k</label>
            </button>
            <button class="icon-btn" onclick="togglePiP()">
                <span>🔲</span>
                <label>PiP Mode</label>
            </button>
            <button class="icon-btn" onclick="nextVideo()">
                <span>⏭</span>
                <label>Next Track</label>
            </button>
            <button class="icon-btn" onclick="shareVideo()">
                <span>⎋</span>
                <label>Share</label>
            </button>
        </div>

        <footer>DEDALO &copy; 2026</footer>
    </div>

    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
    <script>
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/"; 
        const playlist = [
            { file: "Red Think - Badret - Official video.mp4", title: "BADRET - Red Think", likes: 2405 },
            { file: "Future Voyage - Badret.mp4", title: "BADRET - Future Voyage", likes: 1892 }
        ];

        let currentVideoIndex = 0;
        const player = document.getElementById('dedaloPlayer');
        const titleDisplay = document.getElementById('videoTitle');
        const overlay = document.getElementById('audioOverlay');

        function loadVideo(index) {
            const video = playlist[index];
            player.src = R2_URL + encodeURIComponent(video.file);
            titleDisplay.innerText = video.title;
            document.getElementById('likeCount').innerText = video.likes >= 1000 ? (video.likes/1000).toFixed(1) + 'k' : video.likes;
            player.load();
            player.play();
        }

        function enableAudio() { player.muted = false; overlay.style.display = 'none'; }
        
        async function togglePiP() { 
            try { 
                if (document.pictureInPictureElement) { await document.exitPictureInPicture(); } 
                else { await player.requestPictureInPicture(); } 
            } catch (e) { console.log("PiP error"); } 
        }

        function nextVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
            loadVideo(currentVideoIndex);
        }

        function shareVideo() {
            if (navigator.share) {
                navigator.share({ title: 'DEDALO TV', text: 'Watching Badret Live', url: window.location.href });
            }
        }

        function toggleLike() {
            const icon = document.getElementById('likeIcon');
            icon.innerText = (icon.innerText === "♡") ? "♥" : "♡";
            icon.style.color = (icon.innerText === "♥") ? "var(--neon)" : "#fff";
        }

        player.onended = nextVideo;
        loadVideo(currentVideoIndex);
    </script>
</body>
</html>
