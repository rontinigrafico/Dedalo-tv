<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    
    <title>DEDALO TV</title>
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #444; --light-gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        header { text-align: center; margin-bottom: 25px; width: 100%; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.3)); }
        .brand { font-size: 9px; letter-spacing: 5px; color: var(--light-gray); text-transform: uppercase; margin-top: 5px; }

        /* Container Player Professionale */
        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #111; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16/9; cursor: pointer; }
        
        #unmuteBtn { position: absolute; bottom: 12px; right: 12px; background: var(--neon); color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; z-index: 999; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,85,0.5); }

        .info-bar { padding: 15px; background: var(--panel); border-bottom: 1px solid #111; width: 100%; }
        .now-playing { font-size: 9px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; }

        .icon-bar { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #111; margin-bottom: 10px; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; width: 60px; }
        .icon-btn span { font-size: 20px; }
        .icon-btn label { font-size: 8px; color: var(--light-gray); text-transform: uppercase; }

        .form-box { width: 100%; margin-top: 25px; padding: 25px; background: var(--panel); border-radius: 15px; border: 1px solid #111; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; border-radius: 10px; font-size: 14px; }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        
        #success-msg { display: none; color: var(--neon); font-size: 13px; font-weight: bold; line-height: 1.6; }

        footer { padding: 40px 0; text-align: center; opacity: 0.15; font-size: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
            <div class="brand">Music Distribution</div>
        </header>

        <div class="video-container">
            <button id="unmuteBtn" onclick="enableAudio()">🔇 TAP TO START</button>
            <video id="dedaloPlayer" class="video-js vjs-default-skin" playsinline muted></video>
            
            <div class="info-bar">
                <div class="now-playing">Direct Broadcast</div>
                <div id="videoTitle" class="video-title">Tuning in...</div>
            </div>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" onclick="nextVideo()"><span>⏭</span><label>Next</label></button>
            <button class="icon-btn" onclick="prevVideo()"><span>⏮</span><label>Back</label></button>
            <button class="icon-btn" onclick="stopVideo()"><span>■</span><label>Stop</label></button>
        </div>

        <div class="form-box">
            <div id="form-content">
                <h3 style="font-size:11px; text-transform:uppercase; color:var(--light-gray); margin-bottom:15px;">Get Access</h3>
                <form id="dedalo-form" action="https://formspree.io/f/mnjokbww" method="POST">
                    <input type="text" name="nickname" placeholder="Nickname" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <button type="submit" class="sub-btn" id="submit-btn">Unlock</button>
                </form>
            </div>
            <div id="success-msg">ACCESS GRANTED.</div>
        </div>
        <footer>DEDALO &copy; 2026</footer>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/script/videojs-ima/1.11.0/videojs.ima.min.js"></script>

    <script>
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/"; 
        const VAST_TAG = "https://adcash.com/video/select.php?r=11187314"; // Il tuo link VAST Adcash
        
        const playlist = [
            { file: "Red Think - Badret - Official video.mp4", title: "BADRET - Red Think" },
            { file: "Future Voyage - Badret.mp4", title: "BADRET - Future Voyage" }
        ];

        let currentVideoIndex = 0;

        // Inizializzazione Video.js
        const player = videojs('dedaloPlayer', {
            autoplay: 'muted',
            controls: false,
            responsive: true,
            fluid: true
        });

        // Configurazione IMA/VAST
        player.ima({
            adTagUrl: VAST_TAG,
            showCountdown: true
        });

        function loadVideo(index) {
            const video = playlist[index];
            player.src({ type: 'video/mp4', src: R2_URL + encodeURIComponent(video.file) });
            document.getElementById('videoTitle').innerText = video.title;
            player.play().catch(e => console.log("User interaction needed"));
        }

        function enableAudio() { 
            // Questo click dell'utente sblocca sia l'audio che la possibilità di caricare Ads
            player.muted(false);
            player.ima.initializeAdDisplayContainer();
            player.ima.requestAds();
            document.getElementById('unmuteBtn').style.display = 'none'; 
            loadVideo(currentVideoIndex);
        }

        function stopVideo() { player.paused() ? player.play() : player.pause(); }
        function nextVideo() { currentVideoIndex = (currentVideoIndex + 1) % playlist.length; loadVideo(currentVideoIndex); }
        function prevVideo() { currentVideoIndex = (currentVideoIndex - 1 + playlist.length) % playlist.length; loadVideo(currentVideoIndex); }

        player.on('ended', nextVideo);
        
        // Form Management
        document.getElementById('dedalo-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Processing...";
            const response = await fetch(e.target.action, {
                method: 'POST',
                body: new FormData(e.target),
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                document.getElementById('form-content').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
