<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEDALO TV</title>
    
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #444; --light-gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        header { text-align: center; margin-bottom: 25px; width: 100%; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.3)); }

        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #111; position: relative; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tasto Unmute sopra il video */
        #unmuteBtn { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); color: #fff; border: none; font-weight: bold; font-size: 14px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 2px; }
        #unmuteBtn span { background: var(--neon); padding: 10px 20px; border-radius: 50px; box-shadow: 0 0 20px var(--neon); }

        .info-bar { padding: 15px; background: var(--panel); border-bottom: 1px solid #111; width: 100%; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; }

        .icon-bar { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #111; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 80px; }
        .icon-btn span { font-size: 24px; margin-bottom: 5px; }
        .icon-btn label { font-size: 9px; color: var(--light-gray); text-transform: uppercase; }

        .form-box { width: 100%; margin-top: 25px; padding: 25px; background: var(--panel); border-radius: 15px; border: 1px solid #111; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; border-radius: 10px; }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
        </header>

        <div class="video-container" id="ad-container">
            <button id="unmuteBtn" onclick="startEverything()"><span>🔇 TAP TO START</span></button>
            <video id="mainPlayer" playsinline muted></video>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" onclick="prevTrack()"><span>⏮</span><label>Back</label></button>
            <button class="icon-btn" onclick="togglePlay()"><span>⏯</span><label>Stop/Play</label></button>
            <button class="icon-btn" onclick="nextTrack()"><span>⏭</span><label>Forward</label></button>
        </div>

        <div class="form-box">
            <form id="dedalo-form" action="https://formspree.io/f/mnjokbww" method="POST">
                <input type="text" name="nickname" placeholder="Nickname" required>
                <input type="email" name="email" placeholder="Email" required>
                <button type="submit" class="sub-btn">Unlock HQ Pack</button>
            </form>
        </div>
    </div>

    <script>
        const VAST_TAG = "https://adcash.com/video/select.php?r=11187314";
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/";
        const playlist = [
            { file: "Red Think - Badret - Official video.mp4", title: "BADRET - Red Think" },
            { file: "Future Voyage - Badret.mp4", title: "BADRET - Future Voyage" }
        ];

        let currentIdx = 0;
        const player = document.getElementById('mainPlayer');
        const unmuteBtn = document.getElementById('unmuteBtn');

        // Carica video iniziale
        function loadTrack(idx) {
            player.src = R2_URL + encodeURIComponent(playlist[idx].file);
            player.load();
            player.play().catch(e => console.log("Autoplay blocked"));
        }

        // FUNZIONE UNICA PER FAR PARTIRE TUTTO
        function startEverything() {
            unmuteBtn.style.display = 'none';
            player.muted = false;
            
            // Prova a caricare l'annuncio VAST (se Adcash risponde)
            // Se l'annuncio fallisce, il video di Badret continuerà normalmente
            requestAds();
            
            loadTrack(currentIdx);
        }

        function togglePlay() {
            if (player.paused) player.play(); else player.pause();
        }

        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx);
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx);
        }

        player.onended = nextTrack;
        loadTrack(currentIdx);

        // --- LOGICA VAST (IMA SDK) ---
        let adsLoader;
        let adsManager;
        let adDisplayContainer;

        function requestAds() {
            const adContainer = document.getElementById('ad-container');
            adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, player);
            adDisplayContainer.initialize();
            
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded, false);
            
            const adsRequest = new google.ima.AdsRequest();
            adsRequest.adTagUrl = VAST_TAG;
            adsLoader.requestAds(adsRequest);
        }

        function onAdsManagerLoaded(adsManagerLoadedEvent) {
            adsManager = adsManagerLoadedEvent.getAdsManager(player);
            try {
                adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
                adsManager.start();
            } catch (adError) {
                player.play();
            }
        }
    </script>
</body>
</html>
