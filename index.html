<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEDALO TV</title>

    <meta name="clckd" content="85003d2ef9da9dd4105a5304988da328" />

    <!-- 1. IMA SDK — PRIMO, prima di tutto -->
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

    <!-- 2. Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- 3. Microsoft Clarity — DOPO IMA, async/defer per non bloccare -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wc3el9wrd5");
    </script>

    <style>
        :root {
            --neon: #ff0055;
            --neon-dim: rgba(255,0,85,0.15);
            --bg: #050505;
            --panel: #0d0d0d;
            --border: #1a1a1a;
            --gray: #555;
            --light-gray: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            opacity: 0.35;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px 15px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 22px;
            width: 100%;
            animation: fadeDown 0.6s ease both;
        }

        .logo-img {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 14px rgba(255,0,85,0.4));
        }

        .brand {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 6px;
            color: var(--light-gray);
            text-transform: uppercase;
            margin-top: 6px;
        }

        .video-wrap {
            width: 100%;
            position: relative;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            aspect-ratio: 16/9;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,0,85,0.05);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #adContainer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .info-bar {
            width: calc(100% - 2px);
            margin: 0 1px;
            padding: 12px 16px 16px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .track-info { flex: 1; }

        .video-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 17px;
            letter-spacing: 1px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-meta {
            font-size: 10px;
            color: var(--light-gray);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .live-badge {
            background: var(--neon);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 4px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            animation: pulseBadge 2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .unmute-box {
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 30;
            display: flex;
        }

        #extUnmuteBtn {
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 14px;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.15s;
            white-space: nowrap;
        }

        #extUnmuteBtn:active { background: rgba(255,0,85,0.7); }

        .icon-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
            position: relative;
            z-index: 25;
            animation: fadeUp 0.6s 0.25s ease both;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            min-width: 60px;
            padding: 10px 5px;
            border-radius: 12px;
            transition: background 0.15s;
        }

        .icon-btn:active { background: rgba(255,255,255,0.05); }

        .icon-btn .ico {
            font-size: 22px;
            line-height: 1;
            pointer-events: none;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .icon-btn .lbl {
            font-size: 8px;
            font-weight: 500;
            color: var(--light-gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            pointer-events: none;
        }

        #likeBtn.liked .ico {
            color: var(--neon);
            text-shadow: 0 0 12px var(--neon);
        }

        .form-box {
            width: 100%;
            margin-top: 20px;
            padding: 24px 20px;
            background: var(--panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            z-index: 20;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .form-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .form-sub {
            font-size: 11px;
            color: var(--light-gray);
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 14px 16px;
            color: #fff;
            margin-bottom: 10px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: rgba(255,0,85,0.4);
            background: rgba(255,0,85,0.03);
            outline: none;
        }

        input::placeholder { color: var(--gray); }

        .sub-btn {
            width: 100%;
            background: var(--neon);
            color: white;
            border: none;
            padding: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2.5px;
            margin-top: 4px;
            transition: opacity 0.15s, transform 0.1s;
        }

        .sub-btn:active { opacity: 0.85; transform: scale(0.98); }

        footer {
            padding: 36px 0 10px;
            text-align: center;
            opacity: 0.12;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            width: 100%;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div class="wrapper">

    <header>
        <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" class="logo-img" alt="DEDALO">
        <div class="brand">Music Distribution</div>
    </header>

    <div class="video-wrap">
        <div class="video-container">
            <video id="mainPlayer" playsinline muted loop>
                <source src="https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/Red%20Think%20-%20Badret%20-%20Official%20video.mp4" type="video/mp4">
            </video>
            <div id="adContainer"></div>
            <div class="unmute-box">
                <button id="extUnmuteBtn" onclick="activateSound()">🔇 Tap to unmute</button>
            </div>
        </div>
        <div class="info-bar">
            <div class="track-info">
                <div id="videoTitle" class="video-title">BADRET — Red Think</div>
                <div class="track-meta">Official Video</div>
            </div>
            <div class="live-badge">LIVE</div>
        </div>
    </div>

    <div class="icon-bar">
        <button class="icon-btn" id="likeBtn" onclick="handleLike()">
            <span class="ico">♡</span>
            <span class="lbl" id="likeCounter">2384</span>
        </button>
        <button class="icon-btn" onclick="prevTrack()">
            <span class="ico">⏮</span>
            <span class="lbl">Back</span>
        </button>
        <button class="icon-btn" onclick="togglePlay()">
            <span class="ico" id="playIco">⏸</span>
            <span class="lbl">Play</span>
        </button>
        <button class="icon-btn" onclick="nextTrack()">
            <span class="ico">⏭</span>
            <span class="lbl">Next</span>
        </button>
    </div>

    <div class="form-box">
        <div class="form-title">Unlock HQ Pack</div>
        <div class="form-sub">Stems, Lossless & Exclusive Remixes</div>
        <input type="text" placeholder="Nickname">
        <input type="email" placeholder="Email Address">
        <button class="sub-btn">🎵 Get Free Access</button>
    </div>

    <footer>DEDALO © 2026</footer>
</div>

<script>
    const VAST_TAG = "https://youradexchange.com/video/select.php?r=11187574";
    const R2_URL   = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/";

    const playlist = [
        { file: "Red Think - Badret - Official video.mp4",  title: "BADRET — Red Think" },
        { file: "Future Voyage - Badret.mp4",               title: "BADRET — Future Voyage" }
    ];

    let currentIdx     = 0;
    let adsLoader      = null;
    let adsManager     = null;
    let adDisplayContainer = null;
    let muted          = true;
    let imaInitialized = false;

    const player      = document.getElementById('mainPlayer');
    const adContainer = document.getElementById('adContainer');
    const unmuteBtn   = document.getElementById('extUnmuteBtn');

    /* ─────────────────────────────────────────
       ATTENDI IMA SDK con polling attivo
       (Clarity async non deve bloccare IMA)
    ───────────────────────────────────────── */
    function waitForIMA(callback, maxAttempts, attempt) {
        maxAttempts = maxAttempts || 30;
        attempt     = attempt     || 0;

        if (typeof google !== 'undefined' && google.ima) {
            callback();
        } else if (attempt < maxAttempts) {
            setTimeout(function() {
                waitForIMA(callback, maxAttempts, attempt + 1);
            }, 200);
        } else {
            console.warn('IMA SDK non disponibile dopo ' + (maxAttempts * 200) + 'ms — fallback a content.');
            resumeContent();
        }
    }

    /* ─────────────────────────────────────────
       INIT
    ───────────────────────────────────────── */
    window.addEventListener('load', function() {
        // Avvia il video silenzioso subito
        player.muted = true;
        player.play().catch(function() {});

        // Aspetta IMA prima di fare qualsiasi cosa con gli ad
        waitForIMA(function() {
            initAdDisplayContainer();
            requestPreroll();
        });
    });

    function initAdDisplayContainer() {
        if (imaInitialized) return;
        adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, player);
        adDisplayContainer.initialize();

        adsLoader = new google.ima.AdsLoader(adDisplayContainer);
        adsLoader.addEventListener(
            google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
            onAdsManagerLoaded,
            false
        );
        adsLoader.addEventListener(
            google.ima.AdErrorEvent.Type.AD_ERROR,
            onAdError,
            false
        );

        imaInitialized = true;
    }

    /* ─────────────────────────────────────────
       RICHIEDI PREROLL
    ───────────────────────────────────────── */
    function requestPreroll() {
        if (!imaInitialized) return;

        // Distruggi eventuali adsManager precedenti
        if (adsManager) {
            adsManager.destroy();
            adsManager = null;
        }

        var w = player.offsetWidth  > 0 ? player.offsetWidth  : 640;
        var h = player.offsetHeight > 0 ? player.offsetHeight : 360;

        var req = new google.ima.AdsRequest();
        req.adTagUrl             = VAST_TAG;
        req.linearAdSlotWidth    = w;
        req.linearAdSlotHeight   = h;
        req.setAdWillAutoPlay(true);
        req.setAdWillPlayMuted(true);

        try {
            adsLoader.requestAds(req);
        } catch(e) {
            console.warn('requestAds error:', e);
            resumeContent();
        }
    }

    /* ─────────────────────────────────────────
       ADS MANAGER LOADED
    ───────────────────────────────────────── */
    function onAdsManagerLoaded(e) {
        adsManager = e.getAdsManager(player);

        adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
        adsManager.addEventListener(google.ima.AdEvent.Type.STARTED, onAdStarted);
        adsManager.addEventListener(google.ima.AdEvent.Type.SKIPPED,             resumeContent);
        adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE,            resumeContent);
        adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED,   resumeContent);
        adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED, resumeContent);

        var w = player.offsetWidth  > 0 ? player.offsetWidth  : 640;
        var h = player.offsetHeight > 0 ? player.offsetHeight : 360;

        try {
            adsManager.init(w, h, google.ima.ViewMode.NORMAL);
            adsManager.setVolume(0); // Sempre muto all'inizio
            adsManager.start();
        } catch(err) {
            console.warn('adsManager.start() error:', err);
            resumeContent();
        }
    }

    function onAdStarted() {
        player.pause();
        adContainer.style.pointerEvents = 'auto';
        unmuteBtn.style.display = 'flex'; // Mostra sempre unmute durante l'ad
    }

    /* ─────────────────────────────────────────
       RIPRESA CONTENUTO
    ───────────────────────────────────────── */
    function resumeContent() {
        adContainer.style.pointerEvents = 'none';
        unmuteBtn.style.display = muted ? 'flex' : 'none';
        player.muted = muted;

        player.play().catch(function(error) {
            console.warn('Autoplay bloccato, forzo mute:', error);
            muted = true;
            player.muted = true;
            unmuteBtn.style.display = 'flex';
            player.play().catch(function(e) {
                console.error('Play definitivamente bloccato:', e);
            });
        });
    }

    /* ─────────────────────────────────────────
       AD ERROR
    ───────────────────────────────────────── */
    function onAdError(e) {
        console.warn('IMA Ad Error:', e.getError ? e.getError() : e);
        if (adsManager) {
            adsManager.destroy();
            adsManager = null;
        }
        resumeContent();
    }

    /* ─────────────────────────────────────────
       UNMUTE
    ───────────────────────────────────────── */
    function activateSound() {
        muted = false;
        player.muted = false;
        if (adsManager) adsManager.setVolume(1);
        unmuteBtn.style.display = 'none';
    }

    /* ─────────────────────────────────────────
       PLAYER CONTROLS
    ───────────────────────────────────────── */
    function handleLike() {
        var counter = document.getElementById('likeCounter');
        var btn     = document.getElementById('likeBtn');
        var ico     = btn.querySelector('.ico');
        if (btn.classList.contains('liked')) {
            counter.textContent = parseInt(counter.textContent) - 1;
            ico.textContent = '♡';
        } else {
            counter.textContent = parseInt(counter.textContent) + 1;
            ico.textContent = '♥';
        }
        btn.classList.toggle('liked');
    }

    function togglePlay() {
        var ico = document.getElementById('playIco');
        if (player.paused) { player.play(); ico.textContent = '⏸'; }
        else               { player.pause(); ico.textContent = '▶'; }
    }

    function updateTrack(idx) {
        currentIdx = idx;
        var t = playlist[currentIdx];
        player.src = R2_URL + encodeURIComponent(t.file);
        document.getElementById('videoTitle').textContent = t.title;
        document.getElementById('playIco').textContent = '⏸';
        player.load();

        // Chiedi un nuovo preroll solo se IMA è già inizializzato
        if (imaInitialized) {
            requestPreroll();
        }
    }

    function nextTrack() { updateTrack((currentIdx + 1) % playlist.length); }
    function prevTrack() { updateTrack((currentIdx - 1 + playlist.length) % playlist.length); }

    player.addEventListener('ended', nextTrack);
</script>
</body>
</html>
