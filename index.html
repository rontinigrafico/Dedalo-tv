<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEDALO TV</title>
    
    <script type="text/javascript" src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #444; --light-gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header originale con scritta Music Distribution */
        header { text-align: center; margin-bottom: 25px; width: 100%; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.3)); }
        .brand { font-size: 9px; letter-spacing: 5px; color: var(--light-gray); text-transform: uppercase; margin-top: 5px; }

        /* Container Player Video */
        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #111; position: relative; aspect-ratio: 16/9; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Contenitore per Adcash In-stream */
        #adContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* Info Bar sotto il player */
        .info-bar { padding: 15px; background: var(--panel); border-bottom: 1px solid #111; width: 100%; border-radius: 0 0 20px 20px; margin-top: -20px; position: relative; z-index: 5; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; color: #fff; text-align: center; }

        /* NUOVO TASTO UNMUTE ESTERNO E EVIDENTE */
        .unmute-box { width: 100%; margin: 20px 0; display: flex; justify-content: center; }
        #extUnmuteBtn { background: var(--neon); color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,85,0.6); transition: 0.3s; width: 100%; max-width: 300px; text-align: center; display: block; }
        #extUnmuteBtn:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(255,0,85,0.4); }

        /* Icon Bar ordinata: Like | Back | Stop/Play | Forward */
        .icon-bar { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #111; margin-bottom: 10px; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; min-width: 60px; }
        .icon-btn:active { transform: scale(0.9); }
        .icon-btn span { font-size: 20px; color: #fff; }
        .icon-btn label { font-size: 8px; color: var(--light-gray); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Stile specifico per il pulsante Like e il contatore */
        #likeBtn span { color: var(--light-gray); transition: 0.3s; }
        #likeBtn.liked span { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* Form HQ Pack */
        .form-box { width: 100%; margin-top: 25px; padding: 25px; background: var(--panel); border-radius: 15px; border: 1px solid #111; text-align: center; }
        input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; border-radius: 10px; font-size: 14px; }
        input:focus { border-color: var(--neon); }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        
        #success-msg { display: none; color: var(--neon); font-size: 13px; font-weight: bold; line-height: 1.6; }

        footer { padding: 40px 0; text-align: center; opacity: 0.15; font-size: 10px; width: 100%; color: var(--light-gray); }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
            <div class="brand">Music Distribution</div>
        </header>

        <div class="video-container">
            <video id="mainPlayer" playsinline muted loop>
                <source src="" type="video/mp4">
            </video>
            <div id="adContainer"></div>
        </div>
        
        <div class="info-bar">
            <div id="videoTitle" class="video-title">Tuning in...</div>
        </div>

        <div class="unmute-box">
            <button id="extUnmuteBtn" onclick="startEverything()">🔇 TAP TO UNMUTE</button>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" id="likeBtn" onclick="handleLike()">
                <span>♡</span>
                <label id="likeCounter">0</label>
            </button>
            <button class="icon-btn" onclick="prevTrack()"><span>⏮</span><label>Back</label></button>
            <button class="icon-btn" onclick="togglePlay()"><span>■/▶</span><label>Stop/Play</label></button>
            <button class="icon-btn" onclick="nextTrack()"><span>⏭</span><label>Forward</label></button>
        </div>

        <div class="form-box">
            <div id="form-content">
                <h3 style="font-size:11px; text-transform:uppercase; color:var(--light-gray); margin-bottom:15px;">Get HQ Pack Access</h3>
                <form id="dedalo-form" action="https://formspree.io/f/mnjokbww" method="POST">
                    <input type="text" name="nickname" placeholder="Nickname" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <button type="submit" class="sub-btn">Unlock Download</button>
                </form>
            </div>
            <div id="success-msg">ACCESS GRANTED.</div>
        </div>
        <footer>DEDALO &copy; 2026</footer>
    </div>

    <script>
        const VAST_TAG = "https://adcash.com/video/select.php?r=11187314";
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/";
        const playlist = [
            { file: "Red Think - Badret - Official video.mp4", title: "BADRET - Red Think" },
            { file: "Future Voyage - Badret.mp4", title: "BADRET - Future Voyage" }
        ];

        let currentIdx = 0;
        const player = document.getElementById('mainPlayer');
        const unmuteBtn = document.getElementById('extUnmuteBtn');

        // --- GESTIONE LIKE TRUCCATO ---
        const START_LIKES = 2384; // Numero di partenza alto
        let currentLikes = parseInt(localStorage.getItem('dedaloLikes')) || START_LIKES;
        let isLiked = localStorage.getItem('dedaloIsLiked') === 'true';

        function updateLikeUI() {
            document.getElementById('likeCounter').innerText = currentLikes;
            if (isLiked) {
                document.getElementById('likeBtn').classList.add('liked');
                document.getElementById('likeBtn').querySelector('span').innerText = '♥';
            } else {
                document.getElementById('likeBtn').classList.remove('liked');
                document.getElementById('likeBtn').querySelector('span').innerText = '♡';
            }
        }

        function handleLike() {
            if (!isLiked) {
                currentLikes++;
                isLiked = true;
            } else {
                currentLikes--;
                isLiked = false;
            }
            localStorage.setItem('dedaloLikes', currentLikes);
            localStorage.setItem('dedaloIsLiked', isLiked);
            updateLikeUI();
        }

        // --- PLAYER LOGIC ---
        function loadTrack(idx) {
            const video = playlist[idx];
            player.src = R2_URL + encodeURIComponent(video.file);
            document.getElementById('videoTitle').innerText = video.title;
            player.load();
            player.play().catch(e => console.log("User interaction needed"));
        }

        // FUNZIONE PER FAR PARTIRE TUTTO (Click su UNMUTE)
        function startEverything() {
            unmuteBtn.style.display = 'none';
            player.muted = false;
            
            // Prova a caricare l'annuncio VAST di Adcash
            requestAds();
            
            player.play();
        }

        function togglePlay() {
            if (player.paused) player.play(); else player.pause();
        }

        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx);
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx);
        }

        // Avvio iniziale
        loadTrack(currentIdx);
        updateLikeUI();

        // --- LOGICA VAST (IMA SDK) ---
        let adsLoader, adsManager, adDisplayContainer;

        function requestAds() {
            const adContainer = document.getElementById('adContainer');
            // Permettiamo i click sull'area ad solo quando l'ad è attivo
            adContainer.style.pointerEvents = 'auto'; 

            adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, player);
            adDisplayContainer.initialize();
            
            adsLoader = new google.ima.AdsLoader(adDisplayContainer);
            adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded, false);
            
            const adsRequest = new google.ima.AdsRequest();
            adsRequest.adTagUrl = VAST_TAG;
            adsLoader.requestAds(adsRequest);
        }

        function onAdsManagerLoaded(adsManagerLoadedEvent) {
            adsManager = adsManagerLoadedEvent.getAdsManager(player);
            
            // Se l'ad finisce o dà errore, ripristiniamo il controllo del player
            adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, function() {
                document.getElementById('adContainer').style.pointerEvents = 'none';
            });

            try {
                adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
                adsManager.start();
            } catch (adError) {
                player.play();
                document.getElementById('adContainer').style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
