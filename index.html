<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="DEDALO TV | BADRET">
    <meta property="og:type" content="video.other">
    <meta property="og:video" content="https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/Red%20Think%20-%20Badret%20-%20Official%20video.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:image" content="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png">

    <title>DEDALO TV</title>
    <style>
        :root { --neon: #ff0055; --bg: #000; --panel: #0a0a0a; --gray: #888; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        
        header { text-align: center; margin-bottom: 30px; }
        .logo-img { width: 150px; height: auto; filter: drop-shadow(0 0 10px rgba(255,0,85,0.4)); }
        .brand { font-size: 10px; letter-spacing: 5px; color: var(--gray); text-transform: uppercase; margin-top: 5px; }

        .video-container { width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        #audioOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 20; cursor: pointer; }
        .audio-icon { font-size: 40px; color: var(--neon); animation: pulse 1.5s infinite; }

        .info-bar { padding: 15px; background: var(--panel); }
        .now-playing { font-size: 9px; color: var(--neon); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 4px; }

        .icon-bar { display: flex; justify-content: space-around; padding: 20px 0; border-bottom: 1px solid #111; }
        .icon-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .icon-btn span { font-size: 20px; }
        .icon-btn label { font-size: 9px; color: var(--gray); text-transform: uppercase; }

        /* Comments Feed (Social Proof) */
        .comments-feed { margin-top: 30px; padding: 0 5px; }
        .comment-card { margin-bottom: 20px; border-left: 2px solid #222; padding-left: 15px; }
        .user-nick { color: var(--neon); font-weight: bold; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .user-text { color: #ccc; font-size: 13px; line-height: 1.4; }

        /* Form area */
        .form-box { margin-top: 10px; padding: 20px; background: var(--panel); border-radius: 15px; border: 1px solid #111; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: var(--neon); }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
            <div class="brand">Music Distribution</div>
        </header>

        <div class="video-container">
            <div id="audioOverlay" onclick="enableAudio()">
                <div class="audio-icon">🔊</div>
            </div>
            <video id="dedaloPlayer" autoplay muted playsinline>
                <source src="" type="video/mp4">
            </video>
            <div class="info-bar">
                <div class="now-playing">Now Playing</div>
                <div id="videoTitle" class="video-title">Tuning in...</div>
            </div>
        </div>

        <div class="icon-bar">
            <button class="icon-btn" onclick="toggleLike()">
                <span id="likeIcon">♡</span>
                <label id="likeCount">2.4k</label>
            </button>
            <button class="icon-btn" onclick="togglePiP()">
                <span>🔲</span>
                <label>PiP</label>
            </button>
            <button class="icon-btn" onclick="nextVideo()">
                <span>⏭</span>
                <label>Next</label>
            </button>
            <button class="icon-btn" onclick="shareVideo()">
                <span>⎋</span>
                <label>Share</label>
            </button>
        </div>

        <div class="comments-feed">
            <div class="comment-card">
                <span class="user-nick">@VIRTUAL_FAN</span>
                <span class="user-text">This Virtual Production is insane. Best visuals of 2024.</span>
            </div>
            <div class="comment-card">
                <span class="user-nick">@AUDIO_MAESTRO</span>
                <span class="user-text">The mix is so clean. Badret never misses!</span>
            </div>
        </div>

        <div class="form-box">
            <form action="https://formspree.io/f/mnjokbww" method="POST">
                <input type="text" name="nickname" placeholder="Nickname" required>
                <input type="email" name="_replyto" placeholder="Your Email" required>
                <textarea name="message" rows="3" placeholder="Write a comment..." required></textarea>
                <input type="hidden" name="_subject" value="New Comment from Dedalo TV">
                <button type="submit" class="sub-btn">Comment and Download</button>
            </form>
        </div>
    </div>

    <script>
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/"; 
        const playlist = [
            { file: "Red Think - Badret - Official video.mp4", title: "BADRET - Red Think", likes: 2405 },
            { file: "Future Voyage - Badret.mp4", title: "BADRET - Future Voyage", likes: 1892 }
        ];

        let currentVideoIndex = 0;
        const player = document.getElementById('dedaloPlayer');
        const titleDisplay = document.getElementById('videoTitle');
        const overlay = document.getElementById('audioOverlay');

        function loadVideo(index) {
            const video = playlist[index];
            player.src = R2_URL + encodeURIComponent(video.file);
            titleDisplay.innerText = video.title;
            document.getElementById('likeCount').innerText = formatLikes(video.likes);
            player.load();
            player.play();
        }

        function enableAudio() {
            player.muted = false;
            overlay.style.display = 'none';
        }

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) { await document.exitPictureInPicture(); } 
                else { await player.requestPictureInPicture(); }
            } catch (error) { console.log("PiP not supported"); }
        }

        function nextVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
            loadVideo(currentVideoIndex);
        }

        function shareVideo() {
            if (navigator.share) {
                navigator.share({ title: 'DEDALO TV', text: 'Watch Badret Live!', url: window.location.href });
            }
        }

        function toggleLike() {
            const icon = document.getElementById('likeIcon');
            icon.innerText = (icon.innerText === "♡") ? "♥" : "♡";
            icon.style.color = (icon.innerText === "♥") ? "var(--neon)" : "#fff";
        }

        function formatLikes(num) { return num >= 1000 ? (num/1000).toFixed(1) + 'k' : num; }

        player.onended = nextVideo;
        loadVideo(currentVideoIndex);
    </script>
</body>
</html>
