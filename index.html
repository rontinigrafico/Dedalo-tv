<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEDALO TV</title>
    <style>
        :root { --neon: #ff0055; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 420px; padding: 10px; box-sizing: border-box; }
        header { text-align: center; margin-bottom: 20px; }
        .logo-box { background: #0a0a0a; padding: 15px; border-radius: 50px; border: 1px solid #200; display: inline-block; }
        .logo-img { width: 140px; height: auto; filter: drop-shadow(0 0 8px var(--neon)); }
        .video-container { width: 100%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid #222; position: relative; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .info-bar { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; }
        .now-playing { font-size: 10px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .video-title { font-size: 14px; font-weight: bold; margin-top: 5px; }
        .btn { background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 20px; font-size: 12px; margin: 10px 5px; cursor: pointer; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 12px; color: #fff; margin-top: 10px; border-radius: 8px; box-sizing: border-box; }
        .sub-btn { width: 100%; background: var(--neon); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo-box">
                <img src="https://i.ibb.co/pj8cty5q/Dedalo-Logo.png" alt="DEDALO LOGO" class="logo-img">
            </div>
        </header>

        <div class="video-container">
            <video id="dedaloPlayer" controls autoplay muted playsinline>
                <source src="" type="video/mp4">
            </video>
            <div class="info-bar">
                <div class="now-playing">In Onda</div>
                <div id="videoTitle" class="video-title">Caricamento...</div>
            </div>
        </div>

        <button class="btn" onclick="nextVideo()">PROSSIMO VIDEO ⏭</button>

        <div style="margin-top:20px;">
            <form action="https://formspree.io/f/MettiloQui" method="POST">
                <input type="email" name="email" placeholder="Email per download" required>
                <textarea name="comment" placeholder="Lascia un commento..." required></textarea>
                <button type="submit" class="sub-btn">INVIA E SCARICA</button>
            </form>
        </div>
    </div>

    <script>
        const R2_URL = "https://pub-c22608bd1fae47369612e237f3e1971c.r2.dev/"; 

        // ATTENZIONE: Questi sono i nomi REALI dei file che vedo nello screenshot
        const playlist = [
            { file: "Red think - Badret - Video ufficiale.mp4", title: "BADRET - Red Think" },
            { file: "Viaggio futuro - Badret.mp4", title: "BADRET - Viaggio nel Futuro" }
        ];

        let currentVideoIndex = 0;
        const player = document.getElementById('dedaloPlayer');
        const titleDisplay = document.getElementById('videoTitle');

        function loadVideo(index) {
            const video = playlist[index];
            // encodeURIComponent gestisce gli spazi e i caratteri speciali
            const videoUrl = R2_URL + encodeURIComponent(video.file);
            console.log("Tentativo di caricamento:", videoUrl);
            player.src = videoUrl;
            titleDisplay.innerText = video.title;
            player.load();
            player.play().catch(e => console.log("Autoplay richiede interazione"));
        }

        function nextVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
            loadVideo(currentVideoIndex);
        }

        player.onended = nextVideo;
        loadVideo(currentVideoIndex);
    </script>
</body>
</html>
